<!DOCTYPE html>
<html dir="ltr" lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
  <title>Datacom Web Components Demo</title>
  <link rel="stylesheet" href="/build/datacom.css" />
  <link rel="stylesheet" href="/assets/css/main.css" />
  <script type="module" src="/build/datacom.esm.js"></script>
  <script nomodule src="/build/datacom.js"></script>
</head>

<body>

  <datacom-menubar></datacom-menubar>

  <main>
    <h2>Welcome to Stencil</h2>
    <p>We're going to build a demo site using all our components...</p>

    <datacom-dropdown label="Country" search="true">
      <datacom-dropdown-option icon="globe" value="NZ" label="New Zealand"></datacom-dropdown-option>
      <datacom-dropdown-option value="AU" label="Australia"></datacom-dropdown-option>
      <datacom-dropdown-option search="Great Britan | England | Wales | Scotland" value="GB" label="Great Britan">
      </datacom-dropdown-option>
      <datacom-dropdown-option text="France" value="FR" label="France"></datacom-dropdown-option>
    </datacom-dropdown>
  </main>

  <footer>

  </footer>
</body>

</html>
